<!DOCTYPE html>

<html lang="pt-BR">
	<head>
		<title>teste</title>
		<meta charset="utf-8"/>
	</head>
	<body>
		<div id="main-menu">
			<h1>HMML clicker game</h1>
			<button id="start-btn">Start!</button>
		</div>
		<div id="game-menu">
			<p>Clicks:
				<span id="clicks-count">0</span>
			</p>
			<button id="click-btn">Clique aqui</button>
		</div>
		<div>
			<script>const mainBtn = document.getElementById("start-btn");
    const clickBtn = document.getElementById("click-btn");
    const clicksTxt = document.getElementById("clicks-count");
    const mainMenu = document.getElementById("main-menu");
    const gameMenu = document.getElementById("game-menu");

    let clicks = 0;

    mainBtn.addEventListener('click', () => {
        mainMenu.style.display = "none";
        gameMenu.style.display = "block";
    });

    clickBtn.addEventListener('click', () => {
        clicks += 1;
        clicksTxt.textContent = clicks;
    })</script>
			<style>body
{display: flex;
align-items: center;
justify-content: center;
height: 90%}

#game-menu
{display: none}

button
{cursor: pointer}</style>
		</div>
	</body>
</html>
